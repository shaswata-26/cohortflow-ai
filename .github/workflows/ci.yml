name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Frontend install and type-check
        working-directory: apps/frontend
        run: |
          npm install
          npm run type-check
      - name: Backend install and build
        working-directory: apps/backend
        run: |
          npm install
          npx prisma generate
          npm run build
